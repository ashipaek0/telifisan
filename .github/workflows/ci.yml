name: Telifisan CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/ --ignore E501,F401 --select E,W,F

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and tag
        run: |
          docker build -t irunmole/telifisan:latest .
          docker tag irunmole/telifisan:latest irunmole/telifisan:${{ github.sha }}
      - name: Verify image runs
        run: |
          docker run -d --name telifisan-ci -p 8000:8000 irunmole/telifisan:latest
          sleep 5
          curl -sf http://localhost:8000/health || (docker logs telifisan-ci && exit 1)
          docker stop telifisan-ci
      - name: Push to Docker Hub
        run: |
          docker push irunmole/telifisan:latest
          docker push irunmole/telifisan:${{ github.sha }}
