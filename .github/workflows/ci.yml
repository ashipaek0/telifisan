name: Telifisan CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: cd tests && python -m pytest test_backend.py test_integration.py -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/ --ignore E501,F401 --select E,W,F

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t telifisan:ci .
      - name: Verify image runs
        run: |
          docker run -d --name telifisan-ci -p 8000:8000 telifisan:ci
          sleep 5
          curl -sf http://localhost:8000/health || (docker logs telifisan-ci && exit 1)
          docker stop telifisan-ci
